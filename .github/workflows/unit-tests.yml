# Run JVM unit tests on push and PR to main.
# Uses JAVA_HOME from setup-java; see README for local JDK setup.
name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # gradle.properties may set org.gradle.java.home to a local path; unset for CI
      - name: Use JAVA_HOME for Gradle
        run: |
          sed -i '/^org.gradle.java.home=/d' gradle.properties || true

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew :app:testDebugUnitTest --no-daemon
